<div class="flex flex-col h-screen bg-slate-50">

  <header class="bg-slate-900 px-6 py-3 flex items-center gap-2 flex-shrink-0 shadow-md">

    <nav class="flex items-center gap-1 flex-1">
      <a
        routerLink="/posts"
        routerLinkActive="bg-slate-700 text-white"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-2 px-4 py-2 rounded-md text-slate-400 hover:text-white hover:bg-slate-700/60 transition-colors text-sm font-medium"
      >
        <i class="pi pi-home text-sm"></i>
        Home
      </a>

      <a
        routerLink="/my-posts"
        routerLinkActive="bg-slate-700 text-white"
        class="flex items-center gap-2 px-4 py-2 rounded-md text-slate-400 hover:text-white hover:bg-slate-700/60 transition-colors text-sm font-medium"
      >
        <i class="pi pi-list text-sm"></i>
        Mis posts
      </a>

      <a
        routerLink="/users"
        routerLinkActive="bg-slate-700 text-white"
        class="flex items-center gap-2 px-4 py-2 rounded-md text-slate-400 hover:text-white hover:bg-slate-700/60 transition-colors text-sm font-medium"
      >
        <i class="pi pi-users text-sm"></i>
        Usuarios
      </a>
    </nav>

    <button
      (click)="logout()"
      class="flex items-center gap-2 px-4 py-2 rounded-md text-slate-400 hover:text-white hover:bg-red-600/70 transition-colors text-sm font-medium"
    >
      <i class="pi pi-sign-out text-sm"></i>
      Cerrar sesión
    </button>

  </header>

  <div class="flex-1 flex flex-col overflow-hidden">
    <router-outlet />
  </div>

</div>
