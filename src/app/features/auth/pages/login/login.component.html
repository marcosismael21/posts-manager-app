<div class="min-h-screen flex items-center justify-center bg-slate-200">
  <div class="w-full max-w-2xl mx-4 bg-white border border-slate-200 shadow-sm p-10">

    <div class="mb-7">
      <h1 class="text-2xl font-semibold text-slate-800">Iniciar sesión</h1>
      <p class="text-slate-500 text-sm mt-1">Ingresa tus credenciales para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="flex gap-4 items-start">

        <div class="flex flex-col gap-1.5 flex-1">
          <label for="email" class="text-sm font-medium text-slate-700">Correo electrónico</label>
          <input
            id="email"
            type="email"
            pInputText
            formControlName="email"
            placeholder="correo@ejemplo.com"
            class="w-full"
          />
          @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
            <span class="text-xs text-red-500">Ingresa un correo válido</span>
          }
        </div>

        <div class="flex flex-col gap-1.5 flex-1">
          <label for="password" class="text-sm font-medium text-slate-700">Contraseña</label>
          <p-password
            inputId="password"
            formControlName="password"
            placeholder="••••••••"
            [feedback]="false"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
          />
          @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
            <span class="text-xs text-red-500">La contraseña es requerida</span>
          }
        </div>

        <div class="flex flex-col justify-end" style="padding-top: 1.625rem">
          <p-button
            type="submit"
            label="Ingresar"
            [loading]="loading()"
            [disabled]="loginForm.invalid"
          />
        </div>

      </div>

    </form>
  </div>
</div>
