<p-confirmDialog />

<div class="flex flex-col flex-1 min-h-0 p-6 gap-4">

  <div class="flex-shrink-0 flex items-center justify-between">
    <h1 class="text-xl font-semibold text-slate-800">Mis posts</h1>
    <div class="flex items-center gap-2">
      <div class="flex items-center gap-1 border border-slate-200 rounded p-0.5 bg-white">
        <p-button
          icon="pi pi-list"
          severity="secondary"
          size="small"
          [text]="view() !== 'table'"
          (onClick)="view.set('table')"
          pTooltip="Vista tabla"
        />
        <p-button
          icon="pi pi-th-large"
          severity="secondary"
          size="small"
          [text]="view() !== 'grid'"
          (onClick)="view.set('grid')"
          pTooltip="Vista mosaico"
        />
      </div>
      <label
        for="bulkInput"
        class="cursor-pointer inline-flex items-center gap-2 px-3 py-2 text-sm border border-slate-300 text-slate-600 rounded hover:bg-slate-50 transition-colors"
        [class.opacity-50]="bulkLoading()"
      >
        <i class="pi pi-upload text-xs"></i>
        <span>{{ bulkLoading() ? 'Cargando...' : 'Carga masiva' }}</span>
      </label>
      <input id="bulkInput" type="file" accept=".json" class="hidden" (change)="onBulkFile($event)" />
      <p-button label="Nuevo post" icon="pi pi-plus" size="small" (onClick)="newPost()" />
    </div>
  </div>

  <div class="flex-shrink-0">
    <input
      pInputText
      type="text"
      placeholder="Buscar por título o autor..."
      class="w-full max-w-sm"
      (input)="onSearch($any($event.target).value)"
    />
  </div>

  @if (view() === 'table') {
    <app-posts-table
      [posts]="posts()"
      [loading]="loading()"
      [totalRecords]="totalRecords()"
      [pageSize]="pageSize"
      (lazyLoad)="loadPosts($event)"
      (viewPost)="viewPost($event)"
      (editPost)="editPost($event)"
      (deletePost)="deletePost($event)"
    />
  } @else {
    <app-posts-grid
      [posts]="posts()"
      [loading]="loading()"
      [totalRecords]="totalRecords()"
      [pageSize]="pageSize"
      [first]="first()"
      (pageChange)="loadPosts($event)"
      (viewPost)="viewPost($event)"
      (editPost)="editPost($event)"
      (deletePost)="deletePost($event)"
    />
  }

</div>
