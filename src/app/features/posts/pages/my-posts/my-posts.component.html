<p-confirmDialog />

<div class="flex flex-col flex-1 min-h-0 p-6 gap-4">

  <div class="flex-shrink-0 flex items-center justify-between">
    <h1 class="text-xl font-semibold text-slate-800">Mis posts</h1>
    <div class="flex items-center gap-2">
      <p-button
        label="Modo lista"
        icon="pi pi-list"
        size="small"
        [severity]="view() === 'table' ? 'secondary' : 'secondary'"
        [outlined]="view() !== 'table'"
        (onClick)="view.set('table')"
      />
      <p-button
        label="Modo mosaico"
        icon="pi pi-th-large"
        size="small"
        [severity]="view() === 'grid' ? 'secondary' : 'secondary'"
        [outlined]="view() !== 'grid'"
        (onClick)="view.set('grid')"
      />
      <span class="w-px h-6 bg-slate-500 mx-1"></span>
      <p-button
        label="Carga masiva"
        icon="pi pi-upload"
        severity="secondary"
        size="small"
        [outlined]="true"
        (onClick)="openBulkModal()"
      />
      <p-button
        label="Nuevo post"
        icon="pi pi-plus"
        size="small"
        (onClick)="newPost()"
      />
    </div>
  </div>

  <div class="flex-shrink-0">
    <input
      pInputText
      type="text"
      placeholder="Buscar por título o autor..."
      class="w-full max-w-sm"
      (input)="onSearch($any($event.target).value)"
    />
  </div>

  @if (view() === 'table') {
    <app-posts-table
      [posts]="posts()"
      [loading]="loading()"
      [totalRecords]="totalRecords()"
      [pageSize]="pageSize"
      (lazyLoad)="loadPosts($event)"
      (viewPost)="viewPost($event)"
      (editPost)="editPost($event)"
      (deletePost)="deletePost($event)"
    />
  } @else {
    <app-posts-grid
      [posts]="posts()"
      [loading]="loading()"
      [totalRecords]="totalRecords()"
      [pageSize]="pageSize"
      [first]="first()"
      (pageChange)="loadPosts($event)"
      (viewPost)="viewPost($event)"
      (editPost)="editPost($event)"
      (deletePost)="deletePost($event)"
    />
  }

</div>

<app-bulk-upload-modal
  [visible]="bulkModalVisible()"
  (closed)="bulkModalVisible.set(false)"
  (uploaded)="onBulkUploaded()"
/>
