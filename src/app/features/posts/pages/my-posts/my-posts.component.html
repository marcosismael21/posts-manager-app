<p-confirmDialog />

<div class="flex flex-col flex-1 min-h-0 p-6 gap-4">

  <div class="flex-shrink-0">
    <h1 class="text-xl font-semibold text-slate-800">Mis posts</h1>
  </div>

  <div class="flex-1 min-h-0 bg-white border border-slate-200 rounded-sm overflow-hidden">
    <p-table
      [value]="posts()"
      [lazy]="true"
      (onLazyLoad)="loadPosts($event)"
      [loading]="loading()"
      [paginator]="true"
      [rows]="pageSize"
      [totalRecords]="totalRecords()"
      [rowsPerPageOptions]="[5, 10, 20]"
      [scrollable]="true"
      scrollHeight="flex"
      styleClass="p-datatable-sm"
      [tableStyle]="{ 'min-width': '50rem' }"
    >
      <ng-template pTemplate="header">
        <tr>
          <th class="text-left" style="width: 40%">Título</th>
          <th class="text-left" style="width: 25%">Fecha</th>
          <th class="text-left" style="width: 15%">Imágenes</th>
          <th class="text-left" style="width: 20%">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-post>
        <tr class="hover:bg-slate-50 transition-colors">
          <td class="font-medium text-slate-800 truncate max-w-xs">{{ post.title }}</td>
          <td class="text-slate-500 text-sm">{{ post.createdAt }}</td>
          <td>
            @if (post.imageUrls?.length) {
              <p-tag [value]="post.imageUrls.length + ' img'" severity="secondary" />
            } @else {
              <span class="text-slate-400 text-sm">—</span>
            }
          </td>
          <td>
            <div class="flex items-center gap-1">
              <p-button
                icon="pi pi-eye"
                size="small"
                severity="secondary"
                [text]="true"
                (onClick)="viewPost(post._id)"
                pTooltip="Ver"
              />
              <p-button
                icon="pi pi-pencil"
                size="small"
                severity="secondary"
                [text]="true"
                (onClick)="editPost(post._id)"
                pTooltip="Editar"
              />
              <p-button
                icon="pi pi-trash"
                size="small"
                severity="danger"
                [text]="true"
                (onClick)="deletePost(post._id)"
                pTooltip="Eliminar"
              />
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="4">
            <app-empty-state message="No tienes posts aún" />
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="loadingbody">
        @for (i of [1, 2, 3, 4, 5]; track i) {
          <tr>
            <td colspan="4" class="text-center text-slate-400 py-4">Cargando...</td>
          </tr>
        }
      </ng-template>
    </p-table>
  </div>

</div>
