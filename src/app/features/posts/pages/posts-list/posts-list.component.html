<div class="flex flex-col flex-1 min-h-0 p-6 gap-4">
  <div class="flex items-center justify-between flex-shrink-0">
    <h1 class="text-xl font-semibold text-slate-800">Posts</h1>
    <div class="flex items-center gap-1 border border-slate-200 rounded p-0.5 bg-white">
      <p-button
        icon="pi pi-list"
        severity="secondary"
        size="small"
        [text]="view() !== 'table'"
        (onClick)="view.set('table')"
        pTooltip="Vista tabla"
      />
      <p-button
        icon="pi pi-th-large"
        severity="secondary"
        size="small"
        [text]="view() !== 'grid'"
        (onClick)="view.set('grid')"
        pTooltip="Vista mosaico"
      />
    </div>
  </div>

  <div class="flex-shrink-0">
    <input
      pInputText
      type="text"
      placeholder="Buscar por título o autor..."
      class="w-full max-w-sm"
      (input)="onSearch($any($event.target).value)"
    />
  </div>

  @if (view() === 'table') {
    <app-posts-table
      [posts]="posts()"
      [loading]="loading()"
      [totalRecords]="totalRecords()"
      [pageSize]="pageSize"
      [showEditDelete]="false"
      (lazyLoad)="loadPosts($event)"
      (viewPost)="viewPost($event)"
    />
  } @else {
    <app-posts-grid
      [posts]="posts()"
      [loading]="loading()"
      [totalRecords]="totalRecords()"
      [pageSize]="pageSize"
      [first]="first()"
      [showEditDelete]="false"
      (pageChange)="loadPosts($event)"
      (viewPost)="viewPost($event)"
    />
  }
</div>
