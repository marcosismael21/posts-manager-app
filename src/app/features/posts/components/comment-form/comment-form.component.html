<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-3 p-4">
  <p-editor
    formControlName="body"
    [style]="{ height: '150px' }"
    placeholder="Escribe un comentario..."
  />
  @if (form.get('body')?.invalid && form.get('body')?.touched) {
    <span class="text-xs text-red-500">El comentario no puede estar vacío</span>
  }
  <div class="flex justify-end">
    <p-button
      type="submit"
      label="Comentar"
      size="small"
      [loading]="saving()"
      [disabled]="form.invalid"
    />
  </div>
</form>
