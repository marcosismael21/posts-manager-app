<p-dialog
  [visible]="visible()"
  (visibleChange)="$event ? null : closed.emit()"
  [modal]="true"
  [style]="{ width: '420px' }"
  header="Detalle del usuario"
>
  @if (user(); as u) {
    <div class="flex flex-col gap-5 py-2">
      <div class="flex flex-col gap-2">
        <div class="flex justify-between text-sm">
          <span class="text-slate-400">Nombre</span>
          <span class="text-slate-700">{{ u.name }}</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-slate-400">Email</span>
          <span class="text-slate-700">{{ u.email }}</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-slate-400">Registro</span>
          <span class="text-slate-700">{{ u.createdAt }}</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-slate-400">Última actualización</span>
          <span class="text-slate-700">{{ u.updatedAt }}</span>
        </div>
      </div>
      <div class="flex justify-end gap-2 border-t border-slate-100 pt-4">
        <p-button label="Cerrar" severity="secondary" size="small" (onClick)="closed.emit()" />
        <p-button label="Editar" icon="pi pi-pencil" size="small" (onClick)="edit.emit()" />
      </div>
    </div>
  }
</p-dialog>
